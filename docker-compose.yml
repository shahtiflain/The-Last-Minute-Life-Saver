version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: hustlr-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - hustlr-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hustlr-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/hustlr
      - AI_SERVICE_URL=http://ai-orchestrator:8000
      - FRONTEND_URL=http://localhost:8080
      # Pass through external secrets from local .env if available
    env_file:
      - ./backend/.env
    networks:
      - hustlr-net
    depends_on:
      mongodb:
        condition: service_healthy

  ai-orchestrator:
    build:
      context: ./ai-orchestrator
      dockerfile: Dockerfile
    container_name: hustlr-ai
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    env_file:
      - ./ai-orchestrator/.env
    networks:
      - hustlr-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hustlr-frontend
    ports:
      - "8080:8080"
    networks:
      - hustlr-net
    depends_on:
      - backend

volumes:
  mongodb_data:

networks:
  hustlr-net:
    driver: bridge
